name: Page Module Contract
type: UI Architecture Invariant
location:
  - resources/js/app.js
  - resources/js/pages/**
  - resources/views/**
purpose: Define the framework-agnostic, page-scoped UI module contract that eliminates executable Blade script blocks and guarantees deterministic Alpine initialization.
when_to_use:
  - Building or migrating any interactive Blade page to the page-module pattern
  - Adding new UI behavior that depends on Alpine state or fetch-based CRUD
  - Reviewing PRs that touch interactive Blade + JavaScript integration
when_not_to_use:
  - Static Blade pages with no interactivity
  - Purely presentational Blade partials that emit events only
  - Backend-only changes with no UI behavior impact
rules:
  - Every interactive page must have exactly one page root element with data-page and data-payload attributes.
  - Every interactive page must include exactly one payload script tag with type application/json and an id matching data-payload.
  - Page roots may expose additional typed data-* config contracts such as data-crud-config and data-import-config when shared stateless helpers need server-generated configuration.
  - Blade templates must contain no executable script tags beyond JSON payload blocks.
  - The only allowed script tag in Blade is a payload block: <script type="application/json">.
  - All page UI logic must live in resources/js/pages/**.
  - During the current staged migration, Alpine directives may remain in Blade until a page is fully migrated to the page-module pattern.
  - Each page module must export a mount(rootEl, payload) function.
  - Page modules must register Alpine components inside mount using Alpine.data('ComponentName', ...).
  - Alpine.start() must run exactly once and only after the page module has mounted when data-page is present.
  - Page module loading must be build-safe and not rely on unbounded dynamic imports; the loader must resolve known modules (e.g., via import.meta.glob).
  - No global JavaScript state may be introduced to implement this pattern.
  - Payload parsing must be safe (JSON parse with fallback to an empty object).
  - Page modules must avoid build-invalid syntax such as optional chaining on assignment LHS.
  - Page modules may call shared DOM refresh helpers after successful AJAX mutations when server-rendered navigation or other page chrome becomes stale.
  - Shared helpers must remain stateless and must not replace backend authority.
  - Page modules may compose multiple shared helpers such as CRUD and import abstractions, but page-scoped callbacks, slide-over orchestration, and toasts remain owned by the page module.
public_interface:
  - docs/architecture/ui/PageModuleContract.yaml
  - docs/UI_DESIGN.md
  - resources/js/app.js
  - resources/js/pages/**
  - resources/js/navigation/**
  - data-page
  - data-payload
example_usage: |
  Blade:
    <script type="application/json" id="materials-index-payload">@json($payload)</script>
    <div data-page="materials-index" data-payload="materials-index-payload" x-data="materialsIndex"></div>

  Blade with shared page contracts:
    <script type="application/json" id="sales-products-index-payload">@json($payload)</script>
    <div
        data-page="sales-products-index"
        data-payload="sales-products-index-payload"
        data-crud-config='@json($crudConfig)'
        data-import-config='@json($importConfig)'
        x-data="salesProductsIndex"
    ></div>

  Make Orders (persisted):
    <script type="application/json" id="manufacturing-make-orders-payload">@json($payload)</script>
    <div data-page="manufacturing-make-orders" data-payload="manufacturing-make-orders-payload" x-data="manufacturingMakeOrders"></div>

  Page module:
    // resources/js/pages/materials-index.js
    export function mount(rootEl, payload) {
      Alpine.data('materialsIndex', () => ({ /* state + methods */ }));
    }

    // resources/js/pages/sales-products-index.js
    // Compose parseCrudConfig/createGenericCrud with parseImportConfig/createImportModule.

    // resources/js/pages/manufacturing-make-orders.js
    // Payload includes: make_orders[], recipes[], can_execute, store_url, schedule_url_base, make_url_base.
    // Actions: create (store), schedule, make with JSON responses and toasts on success/error.

  App loader:
    // resources/js/app.js loads ./pages/${slug}.js, calls mount(rootEl, payload), then Alpine.start() once.
