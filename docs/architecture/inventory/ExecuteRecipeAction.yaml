name: ExecuteRecipeAction
type: Action / Domain Service
location:
  - app/Actions/Inventory/ExecuteRecipeAction.php
purpose: Execute a recipe to issue inputs and receipt outputs as stock moves.
when_to_use:
  - Manufacturing or make-order execution
  - Converting input items into an output item via a recipe
when_not_to_use:
  - Inventory adjustments or corrections
  - Costing or planning calculations
rules:
  - Recipe must be active.
  - Recipe type must be manufacturing.
  - Recipe output item must be manufacturable for manufacturing execution.
  - Recipe output_quantity must be greater than zero.
  - Runs must be greater than zero.
  - Inputs are issued and outputs are receipted as stock moves.
  - Input stock move quantity is recipe line quantity multiplied by runs.
  - Output stock move quantity is recipe output_quantity multiplied by runs.
  - Quantities are recorded in each item base UoM.
  - Enum-like values must use values defined in docs/ENUMS.md.
  - Fulfillment recipes are never eligible for Make Orders or recipe execution in this phase.
public_interface:
  - execute(Recipe $recipe, string $runs)
example_usage: |
  $action = new ExecuteRecipeAction();
  $action->execute($recipe, '5.000000');
