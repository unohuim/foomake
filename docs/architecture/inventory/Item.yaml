name: Item
type: Eloquent Model
location:
  - app/Models/Item.php
purpose: Represent a tenant-owned stock-tracked entity with inventory derived from stock moves.
when_to_use:
  - Modeling tenant-owned materials or products
  - Computing on-hand inventory from the ledger
when_not_to_use:
  - Storing denormalized on-hand quantities
rules:
  - Each item has exactly one base UoM referenced by base_uom_id.
  - Products remain normal items; the sales-facing products view is filtered from items where is_sellable = true.
  - On-hand quantity is computed from stock_moves.
  - Purchase receipt inventory impact is derived from posted receipt stock moves recorded in item base units.
  - Inventory is derived and not stored on the items table.
  - Planning price is stored as integer cents in default_price_cents with an uppercase 3-letter default_price_currency_code.
  - Temporary external product identities may be stored on items through external_source and external_id.
  - Product import duplicate identity is tenant-scoped and based on normalized external_source plus exact trimmed external_id when both are present.
  - Product import preview may annotate rows as duplicates before import, and duplicate preview rows are intended to be excluded from default selection.
  - Ecommerce product imports may match an existing item by tenant-scoped normalized external_source plus external_id and update that item instead of creating a duplicate.
  - Existing-item ecommerce imports must preserve the import summary contract used by fulfillment-recipe creation flows and must not create duplicate items or duplicate fulfillment recipes.
public_interface:
  - stockMoves()
  - onHandQuantity()
  - itemUomConversions()
  - default_price_cents (attribute)
  - default_price_currency_code (attribute)
  - is_sellable (attribute)
  - external_source (attribute)
  - external_id (attribute)
example_usage: |
  $onHand = $item->onHandQuantity();
