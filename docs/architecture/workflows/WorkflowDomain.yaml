name: Workflow Domain
type: System-Owned Domain Rule
location:
  - app/Actions/Workflows/EnsureWorkflowDomainsSeededAction.php
  - app/Models/WorkflowDomain.php
  - database/migrations/2026_05_07_000001_create_workflow_domains_table.php
  - database/seeders/WorkflowDomainSeeder.php
  - docs/PR3_ROADMAP.md
purpose: Define the fixed workflow-domain layer used to scope reusable workflow stages and generated tasks across operational domains.
when_to_use:
  - Resolving tenant-owned workflow stages
  - Resolving workflow task-template scoping
  - Supporting domain-general task generation for operational records
when_not_to_use:
  - Admin-managed taxonomy creation
  - Product-specific or ad hoc workflow customization
rules:
  - Workflow domains are fixed system-owned records.
  - Workflow domains scope workflow stages and workflow task templates.
  - Admin users are not intended to create, edit, or delete workflow domains.
  - Canonical workflow-domain keys are sales, purchasing, and manufacturing.
  - Workflow domains must be seeded deterministically and idempotently.
  - Sales is the first runtime consumer, but the abstraction supports purchasing and manufacturing later.
public_interface:
  - EnsureWorkflowDomainsSeededAction::execute()
  - WorkflowDomain::query()
  - docs/architecture/workflows/WorkflowStage.yaml
  - docs/architecture/workflows/WorkflowTaskTemplate.yaml
  - docs/architecture/workflows/Task.yaml
example_usage: |
  Workflow domain usage:
    domain = system-owned sales
    stages = tenant-scoped operational stages for that domain
    templates = tenant-scoped task templates for that domain
