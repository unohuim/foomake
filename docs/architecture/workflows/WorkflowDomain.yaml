name: Workflow Domain
type: System-Owned Domain Rule
location:
  - docs/PR3_ROADMAP.md
purpose: Define the planned fixed workflow-domain layer used to scope reusable workflow stages and generated tasks across operational domains.
when_to_use:
  - Planning tenant-owned workflow stages
  - Planning workflow task-template scoping
  - Planning domain-general task generation for operational records
when_not_to_use:
  - Admin-managed taxonomy creation
  - Product-specific or ad hoc workflow customization
rules:
  - Workflow domains are planned as fixed system-owned records.
  - Workflow domains are planned to scope workflow stages and workflow task templates.
  - Admin users are not intended to create, edit, or delete workflow domains.
  - Sales is the first planned consumer, but the abstraction is intended to support purchasing and manufacturing later.
  - Canonical domain keys are planned documentation in docs/PR3_ROADMAP.md until runtime implementation exists.
public_interface:
  - docs/PR3_ROADMAP.md
  - docs/architecture/workflows/WorkflowStage.yaml
  - docs/architecture/workflows/WorkflowTaskTemplate.yaml
  - docs/architecture/workflows/Task.yaml
example_usage: |
  Planned workflow domain usage:
    domain = system-owned sales
    stages = tenant-scoped operational stages for that domain
    templates = tenant-scoped task templates for that domain

