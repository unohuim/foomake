name: Workflow Task Template
type: Tenant-Scoped Domain Rule
location:
  - app/Models/WorkflowTaskTemplate.php
  - database/migrations/2026_05_07_000003_create_workflow_task_templates_table.php
  - docs/PR3_ROADMAP.md
purpose: Define the tenant-owned task-template layer that configures which future generated tasks should appear for a workflow stage.
when_to_use:
  - Workflow-admin task configuration
  - Stage-scoped generated task definitions
  - Future task-generation snapshots
when_not_to_use:
  - Ad hoc one-off tasks
  - Mutating already-generated task records retroactively
rules:
  - Workflow task templates are tenant-owned and tenant-scoped.
  - Each workflow task template belongs to exactly one workflow domain and one workflow stage.
  - Workflow task templates support title, description, sort_order, is_active, and default_assignee_user_id.
  - Only active templates generate future tasks.
  - Editing a template affects future generated tasks only.
  - Existing generated tasks preserve their creation-time snapshots.
  - Task templates are reorderable within a stage.
  - Generated tasks always resolve to a single assigned user.
  - If no default assignee is configured, generation falls back to the tenant's first user.
public_interface:
  - WorkflowTaskTemplate::query()
  - docs/architecture/workflows/WorkflowStage.yaml
  - docs/architecture/workflows/Task.yaml
  - workflow-manage
example_usage: |
  Task template:
    domain = sales
    stage = packing
    title = Print packing slip
    default_assignee_user_id = 17
    is_active = true
