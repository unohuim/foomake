name: Task
type: Tenant-Scoped Generated Record Rule
location:
  - app/Actions/Tasks/CompleteTaskAction.php
  - app/Actions/Workflows/GenerateSalesOrderWorkflowTasksAction.php
  - app/Models/Task.php
  - database/migrations/2026_05_07_000004_create_tasks_table.php
  - docs/PR3_ROADMAP.md
purpose: Define the domain-general generated task record used to snapshot workflow task-template data against an operational domain record.
when_to_use:
  - Generated task creation on workflow-stage entry
  - Assigned-user task completion behavior
  - Snapshot persistence independent of later template edits
when_not_to_use:
  - Project-management features outside the operational workflow scope
  - Reopening, branching, comments, attachments, or multi-assignee task systems
rules:
  - Tasks are tenant-owned and tenant-scoped.
  - Tasks belong to one workflow domain, one workflow stage, and one originating workflow task template.
  - Tasks reference one domain record through a domain-specific record identifier.
  - Tasks snapshot title, description, sort_order, and assigned user at creation time.
  - Task status values are canonical in docs/ENUMS.md.
  - Task completion is final in this PR scope.
  - Completed tasks remain visible.
  - Already-generated tasks remain unchanged when templates are edited later.
  - Re-entering a stage or retrying a transition must not create duplicate generated tasks for the same template and stage-entry slice.
public_interface:
  - CompleteTaskAction::execute()
  - GenerateSalesOrderWorkflowTasksAction::execute()
  - Task::query()
  - docs/architecture/workflows/WorkflowTaskTemplate.yaml
  - docs/architecture/workflows/SalesOrderWorkflowTaskGating.yaml
example_usage: |
  Generated task snapshot:
    domain = sales
    domain_record_id = sales_order_id
    stage = packing
    template = Print packing slip
    assigned_to_user_id = 17
    status = open
