name: Sales Order Draft Contact Assignment
type: Domain Rule
location:
  - app/Http/Controllers/SalesOrderController.php
  - app/Http/Requests/Sales/StoreSalesOrderRequest.php
  - app/Http/Requests/Sales/UpdateSalesOrderRequest.php
  - app/Models/SalesOrder.php
  - resources/views/sales/orders/index.blade.php
  - resources/views/sales/orders/show.blade.php
purpose: Document the sales-order customer/contact assignment rules used by editable Sales Order header flows on the shared Orders index shell and the Sales Order detail page.
when_to_use:
  - Creating editable sales orders from the Sales Orders index
  - Updating editable sales-order headers from the Sales Order detail page
  - Validating customer/contact combinations for sales-order forms
when_not_to_use:
  - Sales-order line items, pricing snapshots, fulfillment, inventory impact, or invoicing flows
  - Customer-contact primary designation rules outside sales-order assignment
rules:
  - Sales orders are tenant-owned and tenant-scoped.
  - Sales-order header mutations are allowed only while the order status is DRAFT or OPEN.
  - customer_id is required and must belong to the current tenant.
  - contact_id is optional but, when submitted, must belong to the selected customer in the current tenant.
  - Creating a sales order without contact_id defaults contact_id to the selected customer's primary contact when one exists.
  - Updating a sales order without an explicit valid contact_id preserves the current contact only when customer_id does not change.
  - Changing customer_id resets contact_id to the new customer's primary contact unless an explicit valid contact_id for the new customer is submitted.
  - A contact from the previous customer must never be preserved after customer_id changes.
  - Sales-order create, update, and delete mutations return JSON for AJAX consumers and do not redirect.
  - Completed and cancelled sales orders are terminal and cannot be edited again.
  - Sales-order mutations use sales-sales-orders-manage and do not introduce a separate permission slug.
public_interface:
  - SalesOrder::STATUS_DRAFT
  - SalesOrder::STATUS_OPEN
  - SalesOrder::isEditable()
  - SalesOrder::statuses()
  - sales.orders.index
  - sales.orders.store
  - sales.orders.update
  - sales.orders.destroy
example_usage: |
  $order = SalesOrder::query()->create([
      'tenant_id' => $tenant->id,
      'customer_id' => $customer->id,
      'contact_id' => $customer->contacts->firstWhere('is_primary', true)?->id,
      'status' => SalesOrder::STATUS_DRAFT,
  ]);
