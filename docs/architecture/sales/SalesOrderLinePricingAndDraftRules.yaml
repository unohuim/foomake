name: Sales Order Line Pricing And Editable Rules
type: Domain Rule
location:
  - app/Http/Controllers/SalesOrderLineController.php
  - app/Http/Requests/Sales/StoreSalesOrderLineRequest.php
  - app/Http/Requests/Sales/UpdateSalesOrderLineRequest.php
  - app/Models/SalesOrder.php
  - app/Models/SalesOrderLine.php
  - database/migrations/2026_05_04_000010_create_sales_order_lines_table.php
  - database/migrations/2026_05_14_130000_add_external_id_to_sales_order_lines_table.php
  - resources/views/sales/orders/show.blade.php
purpose: Document the editable sales-order line mutation rules, immutable unit-price snapshots, canonical quantity math, and optional source-line identity used on the Sales Order detail page.
when_to_use:
  - Adding lines to editable sales orders from the Sales Order detail page
  - Removing lines from editable sales orders from the Sales Order detail page
  - Editing editable sales-order line quantities from the Sales Order detail page
  - Validating sellable-item eligibility and line payloads
when_not_to_use:
  - Sales-order header customer/contact assignment
  - Sales-order lifecycle transitions, fulfillment, shipping, invoicing, payments, or completion inventory posting
rules:
  - Sales order lines are tenant-owned and tenant-scoped.
  - Sales order line mutations are allowed only while the parent sales order status is DRAFT or OPEN.
  - Only items eligible for selling may be added as sales-order lines.
  - quantity is stored and exposed as a canonical scale-6 BCMath string.
  - sales_order_lines.external_id, when present, stores source-system line identity and is never treated as the local primary key.
  - unit_price_cents is captured from the item at line creation and becomes an immutable snapshot.
  - unit_price_currency_code is captured at line creation and becomes an immutable snapshot.
  - line_total_cents is stored and exposed as a canonical scale-6 string in minor currency units.
  - Quantity edits recalculate line_total_cents from the stored unit price snapshot and must not mutate snapshot price fields.
  - Later item price changes must not mutate existing sales-order line snapshots.
  - Sales-order line mutations return JSON for AJAX consumers and do not redirect.
  - Completed and cancelled sales orders do not allow line create, update, or delete mutations.
  - Sales-order line mutations use sales-sales-orders-manage and do not introduce a separate permission slug.
public_interface:
  - SalesOrder::STATUS_DRAFT
  - SalesOrder::STATUS_OPEN
  - SalesOrder::allowsLineMutations()
  - SalesOrder::lines()
  - sales.orders.lines.store
  - sales.orders.lines.update
  - sales.orders.lines.destroy
example_usage: |
  $line = SalesOrderLine::query()->create([
      'tenant_id' => $tenant->id,
      'sales_order_id' => $order->id,
      'item_id' => $item->id,
      'quantity' => '2.500000',
      'unit_price_cents' => $item->default_price_cents,
      'unit_price_currency_code' => $item->default_price_currency_code,
      'line_total_cents' => '832.500000',
  ]);
